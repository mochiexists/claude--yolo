<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a1824"/>
      <stop offset="55%" stop-color="#0e0d16"/>
      <stop offset="100%" stop-color="#07060b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6f9c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c6f9c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="260" r="340" fill="url(#glow)"/>

  <!-- ASCII cat -->
  <g font-family="'JetBrains Mono', 'SF Mono', 'Menlo', monospace" font-size="84" font-weight="500" fill="#a99bc8" text-anchor="middle" letter-spacing="6">
    <text x="600" y="180" xml:space="preserve">/\_/\</text>
    <text x="600" y="270" xml:space="preserve">( o.o )</text>
    <text x="600" y="360" xml:space="preserve">&gt; ^ &lt;</text>
  </g>

  <!-- Title -->
  <text x="600" y="490" text-anchor="middle" font-family="Georgia, 'Crimson Pro', serif" font-size="78" font-weight="300" fill="#d4d4dc" letter-spacing="-1">claude <tspan font-family="'JetBrains Mono', 'Menlo', monospace" font-size="64" font-weight="500" fill="#b8a8d8">--yolo</tspan></text>

  <!-- Tagline -->
  <text x="600" y="550" text-anchor="middle" font-family="Georgia, 'Crimson Pro', serif" font-size="26" font-style="italic" fill="#7a7a8a" letter-spacing="0.5">life's too short for --dangerously-skip-permissions</text>
</svg>
